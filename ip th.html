      <script>
         (function () {
           const javaBtn = document.getElementById('ifrpcy-2-2');
           const bedrockBtn = document.getElementById('ifmnh6-2-2');
         
           const javaText = document.getElementById('i4u7o9-2');
           const bedrockText = document.getElementById('i8d3jg-2');
         
           if (!javaBtn || !bedrockBtn) return;
         
           const JAVA_IP = 'image-perspective.gl.joinmc.link';
           const BEDROCK_IP = 'nov-watches.gl.at.ply.gg:11439';
         
           function copy(text, labelEl, btn) {
             const original = labelEl.textContent;
         
             navigator.clipboard.writeText(text).then(() => {
               labelEl.textContent = 'คัดลอกแล้ว!';
               btn.setAttribute('aria-label', 'คัดลอกแล้ว');
         
               setTimeout(() => {
                 labelEl.textContent = original;
                 btn.setAttribute('aria-label', original);
               }, 1500);
             });
           }
         
           function attach(btn, labelEl, value) {
             btn.addEventListener('click', () => copy(value, labelEl, btn));
             btn.addEventListener('keydown', (e) => {
               if (e.key === 'Enter' || e.key === ' ') {
                 e.preventDefault();
                 copy(value, labelEl, btn);
               }
             });
           }
         
           attach(javaBtn, javaText, JAVA_IP);
           attach(bedrockBtn, bedrockText, BEDROCK_IP);
         })();
      </script>
